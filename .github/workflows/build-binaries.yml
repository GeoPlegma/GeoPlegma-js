name: Build native binaries

on:
  push:
    branches:
      - main
  pull_request: # lets this be verified on this PR before merge; drop this later if the 3-platform matrix gets too costly to run on every PR
  workflow_call:
  workflow_dispatch: # only dispatchable once this trigger exists on main, but harmless to keep

env:
  GEOPLEGMA_REF: master # ref of GeoPlegma/GeoPlegma to build the napi bindings from (its default branch)

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-x64-gnu
            target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
          - platform: darwin-arm64
            target: aarch64-apple-darwin
            os: macos-14
          - platform: win32-x64-msvc
            target: x86_64-pc-windows-msvc
            os: windows-2022
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout GeoPlegma (Rust napi-rs source)
        uses: actions/checkout@v4
        with:
          repository: GeoPlegma/GeoPlegma
          ref: ${{ env.GEOPLEGMA_REF }}
          path: GeoPlegma

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install napi-rs dependencies
        run: npm install
        working-directory: GeoPlegma/gp-bindings/js

      - name: Build native binding
        run: npx napi build --release --platform --target ${{ matrix.target }} --output-dir dist
        working-directory: GeoPlegma/gp-bindings/js

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: bindings-${{ matrix.platform }}
          path: GeoPlegma/gp-bindings/js/dist/*.node
          if-no-files-found: error
