name: Publish
on:
  push:
    tags:
      - 'v*'   # triggers on git tags like v0.2.1
permissions:
  id-token: write  # Required for OIDC
  contents: read

jobs:
  build-and-publish:
    runs-on: ubuntu-22.04   # pin this, never ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'
          package-manager-cache: false 

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - run: npm install
      - run: npm run build   # your napi build command

      - run: npm publish