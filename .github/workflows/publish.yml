name: Publish
on:
  push:
    tags:
      - 'v*'   # triggers on git tags like v0.2.1
permissions:
  id-token: write  # Required for OIDC
  contents: read

jobs:
  build-binaries:
    uses: ./.github/workflows/build-binaries.yml

  publish:
    needs: build-binaries
    runs-on: ubuntu-22.04   # pin this, never ubuntu-latest
    permissions:
      id-token: write  # Required for OIDC
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'
          package-manager-cache: false

      - run: npm install
      - run: npm run build

      - name: Download native binaries
        uses: actions/download-artifact@v4
        with:
          pattern: bindings-*
          path: artifacts
          merge-multiple: true

      - name: Distribute binaries into per-platform packages
        run: npx napi artifacts --output-dir artifacts --npm-dir npm

      - name: Sync per-platform package versions
        run: npx napi version --npm-dir npm

      - name: Publish per-platform packages (optionalDependencies)
        # --no-gh-release: this repo isn't a lerna-style monorepo, and napi
        # pre-publish's default --gh-release/--tag-style=lerna combo tries to
        # parse the release commit as a lerna multi-package commit, which
        # doesn't match bumpp's `chore: release vX.Y.Z` commits and crashes.
        #
        # NODE_AUTH_TOKEN: the platform packages (geoplegma-js-*) are new and
        # don't have npm trusted publishing (OIDC) configured yet, so they
        # need a classic token here. geoplegma-js itself already publishes
        # fine via OIDC below.
        run: npx napi pre-publish --npm-dir npm --no-gh-release
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish main package
        run: npm publish
