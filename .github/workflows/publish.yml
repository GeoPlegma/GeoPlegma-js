name: Publish
on:
  push:
    tags:
      - 'v*'   # triggers on git tags like v0.2.1
permissions:
  id-token: write  # Required for OIDC
  contents: read

jobs:
  build-binaries:
    uses: ./.github/workflows/build-binaries.yml

  publish:
    needs: build-binaries
    runs-on: ubuntu-22.04   # pin this, never ubuntu-latest
    permissions:
      id-token: write  # Required for OIDC
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'
          package-manager-cache: false

      - run: npm install
      - run: npm run build

      - name: Download native binaries
        uses: actions/download-artifact@v4
        with:
          pattern: bindings-*
          path: artifacts
          merge-multiple: true

      - name: Distribute binaries into per-platform packages
        run: npx napi artifacts --output-dir artifacts --npm-dir npm

      - name: Sync per-platform package versions
        run: npx napi version --npm-dir npm

      - name: Publish per-platform packages (optionalDependencies)
        run: npx napi pre-publish --npm-dir npm

      - name: Publish main package
        run: npm publish
